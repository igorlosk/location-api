version: "3.9"

services:

  postgres:

    image: postgres:17

    restart: always

    environment:
      POSTGRES_DB: location-api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres:/var/lib/postgresql/data

  redis:

    image: redis:7-alpine

    restart: always

  api:

    build: .

    restart: always

    depends_on:
      - postgres
      - redis

    ports:
      - "8080:8080"

volumes:
  postgres: