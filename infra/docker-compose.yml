version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: location-api-postgres
    environment:
      POSTGRES_DB: location-api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d location-api"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - location-api_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: location-api-redis
    ports:
      - "6379:6379"
    volumes:
      - location-api_redis_data:/data

volumes:
  location-api_pg_data:
  location-api_redis_data:
